services:
  db:
    image: postgres:16-alpine
    container_name: prompthub-db
    environment:
      POSTGRES_DB: prompthub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: prompthub_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Changed host port to 5433
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    container_name: prompthub-app
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata: